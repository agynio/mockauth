version: "3.9"

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: mockauth
      POSTGRES_PASSWORD: mockauth
      POSTGRES_DB: mockauth
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  db-test:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: mockauth
      POSTGRES_PASSWORD: mockauth
      POSTGRES_DB: mockauth_test
    ports:
      - "5433:5432"
    volumes:
      - db-test-data:/var/lib/postgresql/data

volumes:
  db-data:
  db-test-data:
